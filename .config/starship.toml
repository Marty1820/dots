# Shell Prompt Configuration
# Configuration reference: https://starship.rs/config/

# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"
palette = "catppuccin_mocha"
scan_timeout = 60

add_newline = true

format = """\
[ŅéČ](fg:lavender)\
$directory\
${custom.directory_separator_not_git}\
${custom.directory_separator_git}\
$symbol($git_branch[Ņé░](fg:pink))\
$symbol( $git_commit$git_status$git_metrics$git_state) $fill$cmd_duration$all\
$character"""

continuation_prompt = "[ŌØ»ŌØ»](bold green)"

[fill]
symbol = " "

[character]
format = "$symbol "
success_symbol = "[ ŌØ»](bold green)"
error_symbol = "[ ŌØ»](bold red)"

[line_break]
disabled = false

[directory]
truncate_to_repo = true
format = "[ŅŚŠ $path ]($style)"
style = "bold fg:base bg:lavender"
read_only = "’ĆŻ"
read_only_style = "red"
truncation_symbol = ".../"
home_symbol = "~"

[directory.substitutions]
"Documents" = "¾░łÖ"
"Downloads" = "’ĆÖ"
"Music" = "’Ćü"
"Pictures" = "’ĆŠ"
"Videos" = "’ćł"
".config" = "ŅŚ╝"
"dots" = "ŅŚ╗"

[git_branch]
symbol = "Ņ£ź"
format = "[ $symbol$branch(:$remote_branch) ]($style)"
style = "fg:base bg:pink"

[git_metrics]
disabled = false

[git_status]
style = "fg:base bg:red"

[cmd_duration]
min_time = 500
format = "[ Ņ×Ģ $duration ]($style)"
style = "yellow"

[battery]
format = "[$symbol $percentage]($style)"
charging_symbol = "’ā¦"
discharging_symbol = "¾░éā"

[[battery.display]]
threshold = 10
style = "red"

[[battery.display]]
threshold = 20
style = "yellow"

[custom.directory_separator_git]
description = "Output a styled separator right after the directory when inside a git repository."
command = ""
format = "[Ņé░](fg:lavender bg:pink)"
# Only when inside git repository
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"

[custom.directory_separator_not_git]
description = "Output a styled separator right after the directory when NOT inside a git repository."
command = ""
format = "[Ņé░](fg:lavender)"
# Only when NOT inside a git repository
when = "! git rev-parse --is-inside-work-tree > /dev/null 2>&1"

[python]
symbol = "¾░īĀ "

[lua]
symbol = "ŅĀ” "


# BACKGROUND
background {
  monitor =
  path = $HOME/Pictures/wallpapers/framework/lockscreen.png
  blur_passes = 1
  blur_size = 3
  contrast = 1.0
  brightness = 0.5
  vibrancy = 0.0
  vibrancy_darkness = 0.0
}

# GENERAL
general {
  hide_cursor = true
}

# INPUT FIELD
input-field {
  monitor =
  size = 256, 48
  outline_thickness = 0
  dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
  dots_spacing = 0.5 # Scale of dots' absolute size, 0.0 - 1.0
  dots_center = true
  outer_color = rgba(00000000)
  inner_color = rgba(0, 0, 0, 1)
  font_color = rgb(248, 248, 242)
  fail_color = rgb(255, 85, 85)
  check_color = rgb(189, 147, 249)
  capslock_color = rgb(255, 184, 108)
  fade_on_empty = false
  font_family = Mononoki Nerd Font Mono
  placeholder_text = ... #text for input password
  hide_input = false
  position = 0, -100
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
  valign = center
}

# TIME
label {
  monitor =
  text = cmd[update:1000] echo "$TIME12"
  color = rgb(248, 248, 242)
  font_size = 14
  font_family = Iosevka Nerd Font Bold
  position = 0, -150
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
}

# USER
label {
  monitor =
  text = $USER
  color = rgb(248, 248, 242)
  font_size = 14
  font_family = Iosevka Nerd Font Bold Italic
  position = 0, -50
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
}

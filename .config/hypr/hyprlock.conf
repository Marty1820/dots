# Dracula Colors
$backgrounddarker = rgb(191a21)
$background = rgb(282A36)
$foreground = rgb(F8F8F2)
$selection = rgb(44475A)
$comment = rgb(6272A4)
$red = rgb(FF5555)
$orange = rgb(FFB86C)
$yellow = rgb(F1FA8C)
$green = rgb(50FA7B)
$purple = rgb(BD93F9)
$cyan = rgb(8BE9FD)
$pink = rgb(FF79C6)

$font = Hack Nerd Font Mono

# GENERAL
general {
  hide_cursor = true
  immediate_render = true
}

# BACKGROUND
background {
  monitor =
  color = $backgrounddarker
  blur_passes = 0
}

# AUTHENTICATION
auth {
  fingerprint:enabled = true
  fingerprint:ready_message = Scan fingerprint to unlock
}

# ANIMATIONS
animations {
  enabled = false
}

# TOP STATUS
label {
  monitor =
  text = cmd[update:1000] echo -e "BAT: $(cat /sys/class/power_supply/BAT1/capacity)%"
  color = $foreground
  font_size = 15
  font_family = $font
  position = 0, 0
  halign = left
  valign = top
}

label {
  monitor =
  text = cmd[update:1000] echo -e "$(date +"%d %b %Y")"
  color = $foreground
  font_size = 15
  font_family = $font
  position = 0, 0
  halign = right
  valign = top
}

# CENTRAL TIME
label {
  monitor =
  text = $TIME
  font_family = $font
  font_size = 60
  color = $foreground
  position = 0, 150
  halign = center
  valign = center
}

# Authenticate box
shape {
  monitor =
  size = 500, 200
  color = $backgrounddarker
  rounding = 0
  border_size = 2
  border_color = $foreground
  rotate = 0
  position = 0, 0
  halign = center
  valign = center
}

label {
  monitor =
  text = $FPRINTPROMPT
  color = $foreground
  font_size = 15
  font_family = $font
  position = 0, 75
  halign = center
  valign = center
}

label {
  monitor =
  text = <b> Username : </b>
  color = $foreground
  font_size = 15
  font_family = $font
  position = -150, 25
  halign = center
  valign = center
}

label {
  monitor =
  text = $USER
  color = $foreground
  font_size = 15
  font_family = $font
  position = 0, 25
  halign = center
  valign = center
}

label {
  monitor =
  text = <b> Password : </b>
  color = $foreground
  font_size = 15
  font_family = $font
  position = -150, -25
  halign = center
  valign = center
}

# INPUT FIELD
input-field {
  monitor =
  size = 200, 55
  outline_thickness = 0
  dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
  dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
  dots_center = false
  outer_color = $backgrounddarker
  inner_color = $backgrounddarker
  font_color = $foreground
  font_family = $font
  fade_on_empty = false
  placeholder_text = <i> Input Password... </i>
  hide_input = false
  rounding = 0
  check_color = $pink
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -25
  halign = center
  valign = center
}

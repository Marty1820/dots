# Dracula Colors
$background = rgb(0, 0, 0)
$foreground = rgb(F8F8F2)
$red = rgb(FF5555)
$yellow = rgb(F1FA8C)
$pink = rgb(FF79C6)

$font = Hack Nerd Font Mono

# GENERAL
general {
  hide_cursor = true
  immediate_render = true
}

# BACKGROUND
background {
  monitor =
  color = $background
  blur_passes = 0
}

# AUTHENTICATION
auth {
  fingerprint:enabled = true
  fingerprint:ready_message = Scan fingerprint to unlock
}

# ANIMATIONS
animations {
  enabled = false
}

# TOP STATUS
label {
  monitor =
  text = cmd[update:1000] echo -e "BAT: $(cat /sys/class/power_supply/BAT1/capacity)%"
  color = $foreground
  font_size = 20
  font_family = $font
  position = 0, 0
  halign = left
  valign = top
}

label {
  monitor =
  text = cmd[update:1000] date +"%d %b %Y"
  color = $foreground
  font_size = 20
  font_family = $font
  position = 0, 0
  halign = right
  valign = top
}

# CENTRAL TIME
label {
  monitor =
  text = $TIME
  font_family = $font
  font_size = 80
  color = $foreground
  position = 0, 150
  halign = center
  valign = center
}

# Authenticate box
shape {
  monitor =
  size = 500, 200
  color = $background
  rounding = 0
  border_size = 2
  border_color = $foreground
  rotate = 0
  position = 0, 0
  halign = center
  valign = center
}

label {
  monitor =
  text = <b> Username : </b>
  color = $foreground
  font_size = 20
  font_family = $font
  position = -150, 25
  halign = center
  valign = center
}

label {
  monitor =
  text = $USER
  color = $foreground
  font_size = 20
  font_family = $font
  position = 0, 25
  halign = center
  valign = center
}

label {
  monitor =
  text = <b> Password : </b>
  color = $foreground
  font_size = 20
  font_family = $font
  position = -150, -25
  halign = center
  valign = center
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 45
  outline_thickness = 0
  dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
  dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
  dots_center = false
  outer_color = $background
  inner_color = $background
  font_color = $foreground
  font_family = $font
  fade_on_empty = false
  placeholder_text = <i> $FPRINTPROMPT </i>
  hide_input = false
  rounding = -1
  check_color = $pink
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 85, -25
  halign = center
  valign = center
}

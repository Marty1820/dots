# Catpuccin Mocha Colors
$mauve = rgb(cba6f7)
$mauveAlpha = cba6f7
$red = rgb(f38ba8)
$yellow = rgb(f9e2af)
$text = rgb(cdd6f4)
$textAlpha = cdd6f4
$surface0 = rgb(313244)
$base = rgb(1e1e2e)

$accent = $mauve
$accentAlpha = $mauveAlpha
$font = Hack Nerd Font Mono

# GENERAL
general {
  hide_cursor = true
  immediate_render = true
}

# BACKGROUND
background {
  monitor =
  color = $base
  blur_passes = 0
}

# AUTHENTICATION
auth {
  fingerprint:enabled = true
  fingerprint:ready_message = Scan fingerprint to unlock
}

# ANIMATIONS
animations {
  enabled = false
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = 30, 0
  halign = left
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:3600000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = 30, -130
  halign = left
  valign = top
}

# BATTERY
label {
  monitor =
  text = cmd[update:60000] sed 's/$/\%/' /sys/class/power_supply/BAT1/capacity
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -10
  halign = right
  valign = top
}

# FINGERPRINT
label {
  monitor =
  text = $FPRINTPROMPT
  color = $text
  font_size = 14
  font_family = $font
  position = 0, -107
  halign = center
  valign = center
}

# USER AVATAR
image {
  monitor =
  path = $HOME/.face
  size = 100
  border_color = $accent
  position = 0, 75
  halign = center
  valign = center
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $accent
  inner_color = $surface0
  font_color = $text
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -47
  halign = center
  valign = center
}
